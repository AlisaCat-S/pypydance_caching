name: Build and Package

on: [push, pull_request]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: [3.10]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Nuitka and dependencies
      run: |
        python -m pip install --upgrade pip
        pip install nuitka
        pip install -r requirements.txt

    - name: Build with Nuitka
      run: |
        python -m nuitka --standalone getVideo.py

    - name: Archive the build (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: tar -czvf your_script-${{ matrix.os }}-${{ matrix.python-version }}.tar.gz your_script.dist

    - name: Archive the build (macOS)
      if: matrix.os == 'macos-latest'
      run: tar -czvf your_script-${{ matrix.os }}-${{ matrix.python-version }}.tar.gz your_script.dist

    - name: Archive the build (Windows)
      if: matrix.os == 'windows-latest'
      run: Compress-Archive -Path your_script.dist -DestinationPath your_script-${{ matrix.os }}-${{ matrix.python-version }}.zip

    - name: Upload artifact (Linux)
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v2
      with:
        name: build-${{ matrix.os }}-${{ matrix.python-version }}
        path: your_script-${{ matrix.os }}-${{ matrix.python-version }}.tar.gz

    - name: Upload artifact (macOS)
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v2
      with:
        name: build-${{ matrix.os }}-${{ matrix.python-version }}
        path: your_script-${{ matrix.os }}-${{ matrix.python-version }}.tar.gz

    - name: Upload artifact (Windows)
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v2
      with:
        name: build-${{ matrix.os }}-${{ matrix.python-version }}
        path: your_script-${{ matrix.os }}-${{ matrix.python-version }}.zip
